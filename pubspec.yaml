name: petmonitor
description: >-
  Serverless end-to-end encrypted pet monitoring system. One codebase, two
  apps: the iOS Owner App (lib/main_owner.dart) and the Android Pet Monitor
  App (lib/main_monitor.dart).
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State / navigation / UI
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  cupertino_icons: ^1.0.8
  intl: ^0.19.0

  # Firebase (managed services only — no custom backend)
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_messaging: ^15.0.4
  flutter_local_notifications: ^17.2.1

  # Sign-in providers
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.1

  # Media / WebRTC
  flutter_webrtc: ^0.11.6

  # Cryptography (X25519, AES-256-GCM, HMAC-SHA256, HKDF)
  cryptography: ^2.7.0

  # Secure key storage (Android Keystore / iOS Keychain backed)
  flutter_secure_storage: ^9.2.2

  # Pairing QR
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.1

  # Device status / reliability
  battery_plus: ^6.0.2
  connectivity_plus: ^6.0.5
  wakelock_plus: ^1.2.5
  package_info_plus: ^8.0.0
  permission_handler: ^11.3.1
  disk_space_plus: ^0.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
