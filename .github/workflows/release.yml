name: Release

# Builds signed release artifacts when a version tag is pushed.
#
# Required repository secrets:
#   ANDROID_KEYSTORE_BASE64   base64 of the upload keystore (.jks)
#   ANDROID_KEY_PROPERTIES    contents of android/key.properties
#   GOOGLE_SERVICES_JSON      android/app/google-services.json
#   IOS_* secrets             see docs/DEPLOYMENT.md (App Store Connect API)

on:
  push:
    tags: ["v*"]

jobs:
  android-monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Restore signing material
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/upload-keystore.jks
          echo "${{ secrets.ANDROID_KEY_PROPERTIES }}" > android/key.properties
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" > android/app/google-services.json

      - run: flutter pub get
      - name: Build signed monitor app bundle
        run: flutter build appbundle --release -t lib/main_monitor.dart

      - uses: actions/upload-artifact@v4
        with:
          name: monitor-aab
          path: build/app/outputs/bundle/release/app-release.aab

  ios-owner:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      # Unsigned build; signing/upload via App Store Connect API keys —
      # fill in certificates per docs/DEPLOYMENT.md before enabling.
      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign -t lib/main_owner.dart
